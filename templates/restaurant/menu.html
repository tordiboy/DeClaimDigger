{% extends 'restaurant/base.html' %}

{% block content %}

<div class="container py-3">

    <h2 class="fw-bold mb-4 text-center text-md-start">🍽️ Our Menu</h2>

    <div class="row g-4">

        {% for meal in meals %}
        <div class="col-12 col-sm-6 col-md-4">

            <div class="card shadow-sm h-100 meal-card">

                <!-- IMAGE -->
                <div class="meal-img-wrapper">
                    <img src="{{ meal.image.url }}" class="meal-img">
                </div>

                <!-- BODY -->
                <div class="card-body d-flex flex-column">

                    <h5 class="fw-bold">{{ meal.name }}</h5>

                    <p class="text-muted small">
                        {{ meal.description|truncatewords:15 }}
                    </p>

                    <div class="mt-auto d-flex justify-content-between align-items-center">

                        <span class="fw-bold text-success fs-5">
                            ${{ meal.price }}
                        </span>

                        <form action="{% url 'add_to_cart' meal.id %}" method="post">
                            {% csrf_token %}
                            <button class="btn btn-sm btn-success px-3">
                                Add
                            </button>
                        </form>

                    </div>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

<!-- RESPONSIVE STYLES -->
<style>

    /* IMAGE HANDLING */
    .meal-img-wrapper {
        width: 100%;
        height: 220px;
        overflow: hidden;
        border-radius: 12px 12px 0 0;
    }

    .meal-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: 0.3s ease;
    }

    .meal-card:hover .meal-img {
        transform: scale(1.05);
    }

    /* TABLET */
    @media (max-width: 768px) {
        .meal-img-wrapper {
            height: 190px;
        }
    }

    /* MOBILE */
    @media (max-width: 480px) {
        .meal-img-wrapper {
            height: 170px;
        }

        h2 {
            text-align: center;
        }
    }

</style>

{% endblock %}
